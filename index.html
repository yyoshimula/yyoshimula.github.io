<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yasuhiro Yoshimura のアプリ</title>
  <meta name="description" content="Yasuhiro Yoshimura が個人で開発している iPhone アプリの一覧。">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #0d0d0f;
      color: #e8e8ea;
      line-height: 1.7;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }
    h1 { font-size: 1.8rem; margin: 0 0 4px; letter-spacing: .02em; }
    .lead { color: #9a9aa2; font-size: .95rem; margin: 0 0 40px; }
    .app {
      display: block;
      padding: 20px 22px;
      margin: 0 0 16px;
      background: #16161a;
      border: 1px solid #26262c;
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
    }
    .app:hover { border-color: #3a3a44; }
    .app h2 { margin: 0 0 4px; font-size: 1.15rem; }
    .app p { margin: 0; color: #9a9aa2; font-size: .9rem; }
    .app .store { color: #6ea8fe; font-size: .85rem; margin-top: 10px; display: inline-block; }
    footer { margin-top: 48px; color: #76767e; font-size: .85rem; }
    footer a { color: #9a9aa2; }
  </style>
</head>
<body>
  <main>
    <h1>Yasuhiro Yoshimura のアプリ</h1>
    <p class="lead">個人で開発している iPhone アプリです。</p>

    <a class="app" href="https://apps.apple.com/jp/app/frame-search/id6775200635">
      <h2>フレーム検索</h2>
      <p>対戦格闘ゲームのフレームデータを、キャラ・技名・日本語の音声/自然文で検索できるアプリ（非公式・ファンメイド）。</p>
      <span class="store">App Store で見る →</span>
    </a>

    <a class="app" href="https://apps.apple.com/jp/app/id6769686279">
      <h2>こども日記&年表</h2>
      <p>子どもの成長を日記と年表で記録するアプリ。</p>
      <span class="store">App Store で見る →</span>
    </a>

    <footer>
      <p><a href="https://yyoshimura.notion.site/Privacy-Policy-37126b2d6e408157beaaf4dc1281b7db">フレーム検索 プライバシーポリシー</a></p>
      <p>© 2026 Yasuhiro Yoshimura</p>
    </footer>
  </main>
</body>
</html>
